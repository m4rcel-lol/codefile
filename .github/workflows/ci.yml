name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build-standalone:
    name: Test + standalone build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Validate CLI — check hello.codefile
        run: python cli.py check -f examples/hello.codefile

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build standalone binary
        run: pyinstaller --onefile --name codefile cli.py

      - name: Smoke test standalone binary (Linux)
        if: runner.os == 'Linux'
        run: ./dist/codefile version

      - name: Smoke test standalone binary (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\dist\codefile.exe version

      - name: Prepare Linux standalone install bundle
        if: runner.os == 'Linux'
        run: |
          mkdir -p standalone
          cp dist/codefile standalone/codefile
          cp scripts/install-codefile.sh standalone/install-codefile.sh
          chmod +x standalone/install-codefile.sh

      - name: Upload standalone artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: codefile-standalone-${{ matrix.os }}
          path: standalone/*

      - name: Upload standalone artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: codefile-standalone-${{ matrix.os }}
          path: dist/codefile*

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results.xml

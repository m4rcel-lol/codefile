name: Publish GitHub Release

on:
  workflow_run:
    workflows: ["Build Release Binaries"]
    types:
      - completed

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: codefile-linux
          path: ./artifacts/linux
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download .deb package
        uses: actions/download-artifact@v4
        with:
          name: codefile-deb
          path: ./artifacts/deb
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download .rpm package
        uses: actions/download-artifact@v4
        with:
          name: codefile-rpm
          path: ./artifacts/rpm
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Arch package
        uses: actions/download-artifact@v4
        with:
          name: codefile-arch
          path: ./artifacts/arch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Linux install script
        uses: actions/download-artifact@v4
        with:
          name: codefile-install-script
          path: ./artifacts/install-script
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: codefile-windows
          path: ./artifacts/windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: codefile-windows-installer
          path: ./artifacts/windows-installer
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
          body: |
            ## Install on Linux

            ```bash
            # Standalone installer script (installs Codefile + Bash PATH setup)
            curl -fsSL -o install-codefile.sh https://github.com/${{ github.repository }}/releases/download/${{ github.event.workflow_run.head_branch }}/install-codefile.sh
            bash install-codefile.sh

            # Debian/Ubuntu
            sudo dpkg -i codefile_*.deb

            # Fedora/RHEL
            sudo dnf install ./codefile-*.rpm

            # Arch Linux
            sudo pacman -U ./codefile-*.pkg.tar.zst
            ```

            ## Install on Windows

            Run `codefile-setup.exe` and complete the installer wizard.
            (Optional portable build is also available in `codefile-windows.zip`.)

            ```powershell
            codefile version
            ```
          files: |
            ./artifacts/linux/codefile
            ./artifacts/install-script/install-codefile.sh
            ./artifacts/deb/*.deb
            ./artifacts/rpm/*.rpm
            ./artifacts/arch/*.pkg.tar.zst
            ./artifacts/windows-installer/codefile-setup.exe
            ./artifacts/windows/codefile-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

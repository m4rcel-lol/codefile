name: Publish GitHub Release

on:
  workflow_run:
    workflows: ["Build Release Binaries"]
    types:
      - completed

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: codefile-linux
          path: ./artifacts/linux
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download .deb package
        uses: actions/download-artifact@v4
        with:
          name: codefile-deb
          path: ./artifacts/deb
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: codefile-windows
          path: ./artifacts/windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
          body: |
            ## Install on Linux

            ```bash
            # Option 1 — .deb package (Debian/Ubuntu)
            sudo dpkg -i codefile_*.deb

            # Option 2 — standalone binary
            chmod +x codefile
            sudo mv codefile /usr/local/bin/
            ```

            ## Install on Windows

            Unzip `codefile-windows.zip` and add the folder to your `PATH`, or run:

            ```powershell
            # From the unzipped folder
            .\codefile.exe version
            ```
          files: |
            ./artifacts/linux/codefile
            ./artifacts/deb/*.deb
            ./artifacts/windows/codefile-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

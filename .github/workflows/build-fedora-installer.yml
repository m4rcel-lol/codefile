name: Build Fedora Installer

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-fedora-installer:
    name: Build Fedora/RHEL installer package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build standalone binary
        run: pyinstaller --onefile --name codefile cli.py

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .rpm package (Fedora/RHEL)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          cp dist/codefile rpmbuild/SOURCES/codefile
          cat > rpmbuild/SPECS/codefile.spec <<EOF
          Name:           codefile
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Codefile task programming language
          License:        MIT
          URL:            https://github.com/${{ github.repository }}
          Source0:        codefile
          BuildArch:      x86_64

          %description
          Codefile is a modern, human-readable scripting language inspired by Makefile.

          %prep

          %build

          %install
          install -D -m 0755 %{SOURCE0} %{buildroot}/usr/bin/codefile

          %files
          /usr/bin/codefile
          EOF
          rpmbuild --define "_topdir $PWD/rpmbuild" -bb rpmbuild/SPECS/codefile.spec
          cp rpmbuild/RPMS/x86_64/*.rpm .

      - name: Upload Fedora installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: codefile-rpm
          path: codefile-*.rpm
